<svg xmlns="http://www.w3.org/2000/svg" width="728" height="110" viewBox="0 0 728 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="728" height="110" rx="10" ry="10" fill="url(#bg)"/>
  <rect width="728" height="110" rx="10" ry="10" fill="none" stroke="#3a2a5e" stroke-width="1.5"/>
  <!-- Accent bar bottom -->
  <rect y="106" width="728" height="4" fill="url(#accent)" clip-path="inset(0 0 0 0 round 0 0 10px 10px)"/>
  <!-- Sponsored tag top-right -->
  <rect x="620" y="12" width="92" height="22" rx="5" ry="5" fill="rgba(124,58,237,0.35)"/>
  <text x="635" y="27" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#c4b5fd">♥ Sponsored</text>
  <!-- Skull icon -->
  <text x="36" y="65" font-size="36" fill="#a0a0b8">💀</text>
  <!-- PublicFail text -->
  <text x="100" y="55" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">PublicFail</text>
  <text x="100" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#8888a8">The Startup Cemetery</text>
  <!-- Right side text -->
  <text x="500" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#00d4aa">Learn from 462+ failures →</text>
</svg>
